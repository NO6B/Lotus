<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serenia - Réservation</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='pico.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    <header class="booking-intro">
      <h1>Réserver une séance</h1>
      <p>Sélectionnez une date parmi nos disponibilités.</p>
    </header>

    <section id="reservation">
      <article class="compact-picker">
        <div id="day-selector-container">
          <label>1. Choisissez une date</label>
          <div id="day-list" class="day-pills-list">
            </div>
        </div>

        <div id="time-selector-container" style="display: none; margin-top: 2rem;">
          <label>2. Choisissez un horaire</label>
          <div id="time-grid" class="time-pills-grid">
            </div>
        </div>

        <div id="client-info-section">
            <div class="selected-summary">
                <p id="selection-display"></p>
            </div>

            <form method="POST" action="/">
                <input type="hidden" id="date" name="date" required>
                <input type="hidden" id="heure" name="heure" required>

                <div class="grid">
                    <input type="text" name="prenom" placeholder="Prénom" required>
                    <input type="text" name="nom" placeholder="Nom" required>
                </div>
                <div class="grid">
                    <input type="email" name="mail" placeholder="Email" required>
                    <input type="tel" name="tel" placeholder="Téléphone" required>
                </div>
                <textarea name="message" rows="2" placeholder="Un message ? (facultatif)"></textarea>
                <button type="submit" class="primary">Confirmer le rendez-vous</button>
            </form>
        </div>
      </article>
    </section>
  </main>
  <script src="{{ url_for('static', filename='JS/booking.js') }}"></script>
</body>
</html>
