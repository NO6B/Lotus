<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Institut de Massage - Réservation</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='pico.min.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    <nav>
      <ul><li><strong>Massage</strong></li></ul>
      <ul>
        <li><a href="#soins" class="secondary">Soins</a></li>
        <li><a href="#reservation" role="button">Réserver</a></li>
      </ul>
    </nav>

    <header style="padding: 2rem 0; text-align: center;">
      <h1>Massage énergétique chinois</h1>
    </header>

    <section id="reservation">
      <article>
        <h2>Réserver une séance</h2>
        <form method="POST" action="/">
          <div class="grid">
            <label>Prénom <input type="text" name="prenom" required></label>
            <label>Nom <input type="text" name="nom" required></label>
          </div>
          <div class="grid">
            <label>Email <input type="email" name="mail" required></label>
            <label>Téléphone <input type="tel" name="tel" required></label>
          </div>

          <label for="date">Date souhaitée</label>
          <input type="text" id="date" name="date" placeholder="Choisir une date..." readonly required>

          <div id="slot-section" style="display: none; margin-top: 1rem;">
            <label>Créneaux disponibles</label>
            <div id="slot-grid" class="slot-grid"></div>
            <input type="hidden" id="heure" name="heure" required>
          </div>

          <label for="message" style="margin-top: 1rem;">Message ou précisions (facultatif)</label>
          <textarea id="message" name="message" rows="3" placeholder="Ex: Douleurs au dos, allergies..."></textarea>

          <button type="submit">Confirmer la réservation</button>
        </form>
      </article>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
  <script src="{{ url_for('static', filename='JS/booking.js') }}"></script>
</body>
</html>
