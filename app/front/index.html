<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lotus - Reservation</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='pico.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    <nav>
      <ul><li><strong>Lotus Massage</strong></li></ul>
    </nav>

    <section id="reservation">
      <article>
        <h2>Choisissez votre créneau</h2>
        
        <div class="grid">
          <div></div>
          <div style="text-align: right; margin-bottom: 1rem;">
            <button class="outline secondary" onclick="changerSemaine(-1)">Précédent</button>
            <span id="cal-week-label" style="margin: 0 1rem; font-weight: bold;"></span>
            <button class="outline secondary" onclick="changerSemaine(1)">Suivant</button>
          </div>
        </div>

        <div id="booking-grid" class="cal-grid"></div>

        <hr>

        <form method="POST" action="/">
          <div id="selection-info" style="margin-bottom: 1rem; color: #2ecc71; font-weight: bold;">
            Veuillez sélectionner un créneau dans le planning ci-dessus.
          </div>
          
          <input type="hidden" id="date" name="date" required>
          <input type="hidden" id="heure" name="heure" required>

          <div class="grid">
            <label>Prénom <input type="text" name="prenom" required></label>
            <label>Nom <input type="text" name="nom" required></label>
          </div>
          <div class="grid">
            <label>Email <input type="email" name="mail" required></label>
            <label>Téléphone <input type="tel" name="tel" required></label>
          </div>

          <label>Message (facultatif)
            <textarea name="message" rows="2"></textarea>
          </label>

          <button type="submit" id="btn-submit" disabled>Confirmer la réservation</button>
        </form>
      </article>
    </section>
  </main>

  <script src="{{ url_for('static', filename='JS/booking.js') }}"></script>
</body>
</html>
