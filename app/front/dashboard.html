<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Lotus - Dashboard Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='pico.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    <nav>
      <ul><li><strong>Lotus Admin</strong></li></ul>
      <ul>
        <li><a href="/admin/dashboard" class="secondary">Dashboard</a></li>
        <li><a href="/admin/logout" role="button" class="outline">Déconnexion</a></li>
      </ul>
    </nav>

    <div class="grid">
      <article><header>En attente</header><h2>{{ rdv_en_attente | length }}</h2></article>
      <article><header>Confirmés</header><h2>{{ rdv_confirmes | length }}</h2></article>
      <article><header>Clients</header><h2>{{ clients | length }}</h2></article>
    </div>

    <section>
      <h2>Messages des clients</h2>
      <figure>
        <table role="grid">
          <thead>
            <tr><th>Client</th><th>Message</th><th>Date</th></tr>
          </thead>
          <tbody>
            {% for msg in messages %}
            <tr>
              <td><strong>{{ msg.client.prenom }} {{ msg.client.nom }}</strong></td>
              <td>{{ msg.contenu }}</td>
              <td><small>{{ msg.date_envoi.strftime('%d/%m/%Y %H:%M') }}</small></td>
            </tr>
            {% endfor %}
            {% if not messages %}
            <tr><td colspan="3"><em>Aucun message pour l'instant.</em></td></tr>
            {% endif %}
          </tbody>
        </table>
      </figure>
    </section>

    <section>
      <div class="grid">
        <h2>Planning</h2>
        <div style="text-align: right;">
          <button class="outline secondary" onclick="changerSemaine(-1)">◀ Précédent</button>
          <span id="cal-week-label" style="margin: 0 1rem;"></span>
          <button class="outline secondary" onclick="changerSemaine(1)">Suivant ▶</button>
        </div>
      </div>
      <article><div id="cal-grid" class="cal-grid"></div></article>
    </section>
  </main>

  <dialog id="modal-creneau">
    <article>
      <header>
        <button aria-label="Close" rel="prev" onclick="document.getElementById('modal-creneau').removeAttribute('open')"></button>
        <p><strong>Détails du créneau</strong></p>
      </header>
      <div id="modal-subtitle"></div>
      <div id="modal-admin-actions" class="grid" style="margin-top: 1rem; display: none;">
        <button onclick="document.getElementById('modal-creneau').removeAttribute('open')">Fermer</button>
      </div>
    </article>
  </dialog>

  <script src="{{ url_for('static', filename='JS/dashboard.js') }}"></script>
</body>
</html>
