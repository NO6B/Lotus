<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Lotus Admin - Gestion</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='pico.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    <nav><ul><li><strong>Lotus Admin</strong></li></ul></nav>
    <section>
      <div class="grid">
        <h2>Gestion des disponibilites</h2>
        <div style="text-align: right;">
          <button class="outline secondary" onclick="changerSemaine(-1)">Precedent</button>
          <span id="cal-week-label" style="margin: 0 1rem; font-weight: bold;"></span>
          <button class="outline secondary" onclick="changerSemaine(1)">Suivant</button>
        </div>
      </div>
      <article><div id="cal-grid" class="booking-grid"></div></article>
    </section>
  </main>

  <dialog id="modal-creneau">
    <article>
      <header>
        <button aria-label="Close" rel="prev" onclick="document.getElementById('modal-creneau').removeAttribute('open')"></button>
        <p><strong>Gestion du creneau</strong></p>
      </header>
      <div id="modal-subtitle"></div>
      <footer id="modal-admin-actions" class="grid" style="margin-top: 1rem;"></footer>
    </article>
  </dialog>
  <script src="{{ url_for('static', filename='JS/dashboard.js') }}"></script>
</body>
</html>
