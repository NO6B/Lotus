<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin - Serenia</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='pico.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container" style="max-width: 400px; margin-top: 10vh;">
    <article>
      <header>
        <h1 style="text-align: center; margin-bottom: 0;">Sere<em>nia</em></h1>
        <p style="text-align: center; font-size: 0.8rem; color: var(--pico-muted-color);">ESPACE ADMINISTRATION</p>
      </header>
      
      {% if erreur %}
      <mark style="display: block; margin-bottom: 1rem; text-align: center;">{{ erreur }}</mark>
      {% endif %}

      <form method="POST" action="/admin/login">
        <label for="username">Email</label>
        <input type="username" id="username" name="username" required />

        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required />

        <button type="submit">Se connecter</button>
      </form>
      
      <footer style="text-align: center;">
        <a href="/" class="secondary">← Retour au site</a>
      </footer>
    </article>
  </main>
</body>
</html>
